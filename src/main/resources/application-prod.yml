spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DATABASE_URL:localhost:5432}/${DATABASE_NAME:boilerplate_db}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  error:
    include-stacktrace: never

logging:
  level:
    com.api.boilerplate: INFO
    org.springframework: WARN
